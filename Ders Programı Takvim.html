<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"/>
  <title>Kazanım Takvimi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Kazanım"/>
  <meta name="theme-color" content="#020b1e"/>
  <style>
/* ════════════════════════════════════════════════════
   RESET & TOKENS
════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

:root{
  /* iPhone 14 Pro Max safe areas */
  --sat: env(safe-area-inset-top,    47px);
  --sab: env(safe-area-inset-bottom, 34px);
  --sal: env(safe-area-inset-left,    0px);
  --sar: env(safe-area-inset-right,   0px);

  /* Colours */
  --bg:         #020b1e;
  --bg2:        #051228;
  --bg3:        #081a38;
  --card:       #0a1f42;
  --sheet-bg:   #071630;
  --border:     #152e5e;
  --border-hi:  #1e4a96;
  --text:       #e8f1ff;
  --muted:      #6888b0;
  --accent:     #3b82f6;
  --accent2:    #60a5fa;
  --accent3:    #93c5fd;
  --teal:       #22d3ee;
  --green:      #34d399;
  --warn:       #fbbf24;
  --today-bg:   #1d4ed8;
  --lesson-bg:  #0f2a5c;
  --lesson-bdr: #1e4a96;

  /* Sizes */
  --header-h: calc(var(--sat) + 56px);
  --footer-h: calc(var(--sab) + 48px);
  --cal-side-pad: 14px;
}

html{height:100%;overflow:hidden;background:var(--bg);}
body{
  height:100%;height:100dvh;
  overflow:hidden;
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
}

/* ════════════════════════════════════════════════════
   APP SHELL — Fixed full-screen columns
════════════════════════════════════════════════════ */
.app{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 100% 45% at 50% -5%, rgba(29,78,216,.28) 0%, transparent 65%),
    radial-gradient(ellipse 70% 35% at 90% 95%,  rgba(6,182,212,.08) 0%, transparent 60%);
}

/* ════════════════════════════════════════════════════
   HEADER
════════════════════════════════════════════════════ */
.app-header{
  flex-shrink:0;
  height: var(--header-h);
  padding: var(--sat) var(--cal-side-pad) 0;
  background: linear-gradient(180deg, #0a1e48 0%, #061535 100%);
  border-bottom:1px solid var(--border-hi);
  box-shadow:0 2px 20px rgba(0,0,0,.6);
  display:flex;align-items:flex-end;justify-content:space-between;
  gap:10px;
  padding-bottom:10px;
  z-index:20;
}
.header-left{display:flex;align-items:center;gap:10px;}
.logo-icon{
  width:32px;height:32px;
  background:linear-gradient(135deg,#2563eb,#06b6d4);
  border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;
  box-shadow:0 0 14px rgba(37,99,235,.55);
  flex-shrink:0;
}
.header-title{
  font-family:'Sora',sans-serif;
  line-height:1.25;
}
.header-title .t1{font-size:11px;color:var(--muted);font-weight:600;}
.header-title .t2{font-size:15px;font-weight:800;color:var(--text);}
.header-title .t2 span{color:var(--accent2);}
.header-badge{
  font-size:10px;font-weight:700;
  background:rgba(59,130,246,.15);
  border:1px solid rgba(59,130,246,.3);
  color:var(--accent3);
  padding:4px 10px;border-radius:999px;
  white-space:nowrap;
}

/* ════════════════════════════════════════════════════
   CALENDAR CONTAINER — fills remaining height
════════════════════════════════════════════════════ */
.cal-container{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  padding: 0 var(--cal-side-pad);
}

/* Month navigator */
.month-nav{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 0 10px;
}
.mnav-btn{
  width:40px;height:40px;
  border:none;
  background:var(--bg3);
  border:1px solid var(--border);
  color:var(--text);
  border-radius:12px;
  font-size:20px;line-height:1;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:.12s background,.12s border-color;
  -webkit-user-select:none;user-select:none;
}
.mnav-btn:active{background:var(--lesson-bg);border-color:var(--accent);transform:scale(.93);}
.month-label{
  font-family:'Sora',sans-serif;
  font-size:19px;font-weight:800;
  background:linear-gradient(90deg,#93c5fd,#38bdf8,#67e8f9);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:-.3px;
}
.month-label .year{font-size:14px;opacity:.7;margin-left:4px;}

/* Day-of-week row */
.dow-row{
  flex-shrink:0;
  display:grid;
  grid-template-columns:repeat(7,1fr);
  margin-bottom:5px;
}
.dow-cell{
  text-align:center;
  font-size:10.5px;font-weight:800;
  color:var(--muted);
  padding:3px 0;
  text-transform:uppercase;letter-spacing:.4px;
}
.dow-cell.wknd{color:rgba(96,165,250,.45);}

/* Calendar grid — fills ALL available space */
.cal-grid{
  flex:1;
  display:grid;
  grid-template-columns:repeat(7,1fr);
  grid-template-rows:repeat(6,1fr);
  gap:3px;
  /* prevents overflow */
  min-height:0;
}

/* Day cell */
.cal-day{
  border-radius:11px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  border:1px solid transparent;
  gap:2px;
  position:relative;
  transition:.12s transform,.12s background,.12s border-color;
  -webkit-user-select:none;user-select:none;
  overflow:hidden;
  /* fill grid row */
  min-height:0;
}
.cal-day:active{transform:scale(.87);}
.cal-day.empty{pointer-events:none;opacity:.2;}

.cal-day.has-lesson{
  background:var(--lesson-bg);
  border-color:var(--lesson-bdr);
}
.cal-day.has-lesson:active{
  background:#163572;border-color:var(--accent);
}
.cal-day.selected{
  background:rgba(37,99,235,.4) !important;
  border-color:var(--accent) !important;
  box-shadow:0 0 0 2px rgba(59,130,246,.35);
}

/* Today highlight */
.cal-day.today .day-num{
  background:var(--today-bg);
  color:#fff;
  border-radius:50%;
  width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;
  box-shadow:0 0 12px rgba(29,78,216,.7);
}

.day-num{
  font-size:14px;font-weight:700;
  line-height:1;color:var(--text);
  /* when today, the span wraps it */
}
.cal-day.other-month .day-num{color:rgba(104,136,176,.28);}
.cal-day.wknd .day-num{color:rgba(96,165,250,.65);}

/* Lesson dots */
.ldots{
  display:flex;gap:2px;justify-content:center;
  flex-wrap:nowrap;
  padding:0 3px;
}
.ldot{
  width:4px;height:4px;border-radius:50%;flex-shrink:0;
}
.ldot.c0{background:var(--accent2);}
.ldot.c1{background:var(--teal);}
.ldot.c2{background:var(--green);}
.ldot.c3{background:var(--warn);}

/* ════════════════════════════════════════════════════
   FOOTER BAR
════════════════════════════════════════════════════ */
.app-footer{
  flex-shrink:0;
  height:var(--footer-h);
  padding:0 16px var(--sab);
  border-top:1px solid var(--border);
  background: linear-gradient(180deg, #051228 0%, #020b1e 100%);
  display:flex;align-items:center;justify-content:center;
}
.footer-txt{
  font-family:'Sora',sans-serif;
  font-size:10.5px;font-weight:700;
  color:var(--muted);
  text-align:center;
}
.footer-txt strong{color:var(--accent2);}

/* ════════════════════════════════════════════════════
   BOTTOM SHEET
════════════════════════════════════════════════════ */
.backdrop{
  position:fixed;inset:0;
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
  z-index:50;
  opacity:0;pointer-events:none;
  transition:opacity .28s;
}
.backdrop.show{opacity:1;pointer-events:all;}

.sheet{
  position:fixed;
  bottom:0;left:0;right:0;
  z-index:60;
  background:var(--sheet-bg);
  border-top:1px solid var(--border-hi);
  border-radius:22px 22px 0 0;
  box-shadow:0 -10px 50px rgba(0,0,0,.7);
  display:flex;flex-direction:column;
  max-height:82dvh;
  padding-bottom:var(--sab);
  transform:translateY(100%);
  transition:transform .34s cubic-bezier(.32,.72,0,1);
  will-change:transform;
}
.sheet.open{transform:translateY(0);}

/* Drag handle zone */
.sheet-drag{
  flex-shrink:0;
  padding:10px 16px 4px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  cursor:grab;touch-action:none;
}
.drag-bar{
  width:40px;height:4px;
  background:rgba(255,255,255,.18);
  border-radius:99px;
}
.sheet-day-title{
  font-family:'Sora',sans-serif;
  font-size:15px;font-weight:800;
  color:var(--accent2);
  text-align:center;
}
.sheet-day-sub{
  font-size:11px;color:var(--muted);
  margin-top:-4px;
}

/* Divider */
.sheet-divider{
  flex-shrink:0;
  height:1px;background:var(--border);
  margin:0 16px;
}

/* Scrollable lesson list */
.sheet-scroll{
  flex:1;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:10px 14px 10px;
  overscroll-behavior:contain;
}

/* Empty state */
.empty-day{
  text-align:center;padding:32px 20px;color:var(--muted);
}
.empty-day .eico{font-size:36px;display:block;margin-bottom:8px;}
.empty-day .etxt{font-size:13px;font-weight:700;}

/* Lesson card */
.lcard{
  background:linear-gradient(145deg,#081835,#060e28);
  border:1px solid var(--border);
  border-radius:15px;
  padding:12px 14px 12px 16px;
  margin-bottom:9px;
  cursor:pointer;
  position:relative;overflow:hidden;
  transition:.14s border-color,.14s background,.12s transform;
}
.lcard::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;
  background:linear-gradient(180deg,#3b82f6,#06b6d4);
  border-radius:3px 0 0 3px;
}
.lcard:active{transform:scale(.97);}
.lcard.active{
  border-color:var(--accent);
  background:linear-gradient(145deg,#0c2254,#091b44);
  box-shadow:0 0 0 1px rgba(59,130,246,.2) inset;
}
.lc-row1{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.lc-name{font-size:13.5px;font-weight:800;line-height:1.35;flex:1;}
.lc-time{
  font-size:10.5px;font-weight:700;
  background:rgba(37,99,235,.2);
  border:1px solid rgba(59,130,246,.28);
  color:var(--accent3);
  padding:3px 9px;border-radius:999px;
  white-space:nowrap;flex-shrink:0;
}
.lc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px;}
.lc-tag{
  font-size:11px;color:var(--muted);
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  padding:2px 8px;border-radius:6px;
}
.lc-warn{font-size:11px;color:var(--warn);margin-top:5px;}

/* Kazanım detail (expands below card) */
.kbox{
  background:linear-gradient(145deg,#040d22,#060f28);
  border:1px solid var(--border);
  border-radius:14px;
  padding:13px 14px;
  margin:-4px 0 9px;
  animation:kslide .22s ease;
}
@keyframes kslide{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.krow{margin-bottom:10px;}
.krow:last-child{margin-bottom:0;}
.klabel{
  font-size:9.5px;font-weight:800;
  color:var(--teal);
  text-transform:uppercase;letter-spacing:1.1px;
  margin-bottom:4px;
}
.kval{font-size:12.5px;line-height:1.75;white-space:pre-line;color:var(--text);}
.kwarn{font-size:12.5px;color:var(--warn);}

/* ════════════════════════════════════════════════════
   DESKTOP OVERRIDE (≥ 700px)
════════════════════════════════════════════════════ */
@media(min-width:700px){
  :root{--cal-side-pad:24px;}
  .month-label{font-size:22px;}
  .day-num{font-size:16px;}
  .dow-cell{font-size:12px;}
  .cal-day{border-radius:14px;}
  .cal-day.today .day-num{width:32px;height:32px;}
}
  </style>
</head>
<body>
<div class="app">

  <!-- ── HEADER ── -->
  <header class="app-header">
    <div class="header-left">
      <div class="logo-icon">📐</div>
      <div class="header-title">
        <div class="t1">Ders Programı</div>
        <div class="t2">Kazanım <span>Takvimi</span></div>
      </div>
    </div>
    <div class="header-badge">2025 – 2026</div>
  </header>

  <!-- ── CALENDAR ── -->
  <div class="cal-container">

    <div class="month-nav">

      <div class="dow-cell">Cum</div>

      <div class="dow-cell wknd">Paz</div>
    </div>

    <div class="cal-grid" id="calGrid"></div>

  </div>

  <!-- ── FOOTER ── -->
  <footer class="app-footer">
    <div class="footer-txt">✦ <strong>Orhan Emre Torun</strong> · Matematik Öğretmeni ✦</div>
  </footer>

</div><!-- /app -->

<!-- BACKDROP -->
<div class="backdrop" id="backdrop"></div>

<!-- BOTTOM SHEET -->
<div class="sheet" id="sheet">
  <div class="sheet-drag" id="sheetDrag">
    <div class="drag-bar"></div>
    <div class="sheet-day-title" id="sheetTitle"></div>
    <div class="sheet-day-sub"  id="sheetSub"></div>
  </div>
  <div class="sheet-divider"></div>
  <div class="sheet-scroll" id="sheetScroll"></div>
</div>

/* ══════════════════════════════════════════════
   CONSTANTS
══════════════════════════════════════════════ */
const MONTHS = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
const DAYS   = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
const DOT_COLORS = ['c0','c1','c2','c3'];

/* ══════════════════════════════════════════════
   STATE
══════════════════════════════════════════════ */
let viewYear   = new Date().getFullYear();
let viewMonth  = new Date().getMonth();
let selISO     = null;
let selLKey    = null;
let sheetOpen  = false;
let dragY0=0, dragDY=0, dragging=false;

/* ══════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════ */
const parseLocal = iso => { const [y,m,d]=iso.split('-').map(Number); return new Date(y,m-1,d); };
const toISO      = d => d.toISOString().slice(0,10);
const ymdISO     = (y,m,d) => `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const todayISO   = () => toISO(new Date());
const monBased   = iso => { const w=parseLocal(iso).getDay(); return w===0?7:w; }; // Mon=1..Sun=7
const lessonKey  = x => `${x.lesson}|${x.group}|${x.room}|${x.slot}`;

const getLessons = iso => {
  const wd = monBased(iso);
  return APP_DATA.schedule.filter(x => x.weekday === wd);
};

function startOfMon(iso){
  const d=parseLocal(iso); const dw=d.getDay()||7; d.setDate(d.getDate()-dw+1); return d;
}
function weeksBetween(a,b){
  return Math.floor((startOfMon(b)-startOfMon(a))/(1000*60*60*24*7));
}

function getPlan(item, iso){
  const plan = APP_DATA.plans[item.lesson];
  if(!plan) return {ok:false, msg:'Yıllık plan yüklenmemiş.'};
  if(plan.type==='relative'){
    const wi = weeksBetween(plan.startDate, iso);
    if(wi<0) return {ok:false, msg:'Plan başlangıcından önce.'};
    const wk = plan.weeks[wi];
    if(!wk) return {ok:false, msg:'Bu hafta için içerik bulunamadı.'};
    return {ok:true, label:`${wi+1}. Hafta`, content:wk.content};
  }
  if(plan.type==='dated'){
    const tgt = parseLocal(iso);
    for(const w of plan.weeks){
      if(!w.dateRange) continue;
      const m = w.dateRange.match(/(\d{1,2})\.?(\d{1,2})?-(\d{1,2})\.?(\d{1,2})?\.(\d{4})/);
      if(m){
        const sd=+m[1], sm=m[2]?+m[2]:+m[4], ed=+m[3], em=+m[4], yr=+m[5];
        const s=new Date(yr,sm-1,sd), e=new Date(yr,em-1,ed);
        if(tgt>=s&&tgt<=e) return {ok:true,label:w.dateRange,gain:w.gain,module:w.module,activity:w.activity};
      }
    }
    return {ok:false, msg:'Bu tarihe uygun hafta bulunamadı.'};
  }
  return {ok:false, msg:'Plan okunamadı.'};
}

/* ══════════════════════════════════════════════
   CALENDAR RENDER
══════════════════════════════════════════════ */
function renderCal(){
  const grid  = document.getElementById('calGrid');
  const label = document.getElementById('monthLabel');
  const today = todayISO();

  // Month label
  label.innerHTML = `${MONTHS[viewMonth]} <span class="year">${viewYear}</span>`;

  const firstDay   = new Date(viewYear, viewMonth, 1);
  const firstDow   = firstDay.getDay() || 7;           // Mon=1
  const daysInMo   = new Date(viewYear, viewMonth+1, 0).getDate();
  const daysInPrev = new Date(viewYear, viewMonth,   0).getDate();

  // Build 42 cells (6 rows × 7)
  const cells = [];

  // Leading prev-month cells
  for(let i=firstDow-1; i>0; i--){
    const d = daysInPrev - i + 1;
    cells.push({ num:d, iso:ymdISO(viewYear, viewMonth-1, d), other:true });
  }
  // Current month
  for(let d=1; d<=daysInMo; d++){
    cells.push({ num:d, iso:ymdISO(viewYear, viewMonth, d), other:false });
  }
  // Trailing
  let trail = 1;
  while(cells.length < 42){
    cells.push({ num:trail, iso:ymdISO(viewYear, viewMonth+1, trail), other:true });
    trail++;
  }

  grid.innerHTML = '';

  cells.forEach(({num, iso, other}) => {
    const lessons = getLessons(iso);
    const hasL    = lessons.length > 0;
    const wd      = monBased(iso);
    const isWknd  = wd >= 6;
    const isToday = iso === today;
    const isSel   = iso === selISO;

    const el = document.createElement('div');
    el.className = [
      'cal-day',
      other    ? 'empty'      : '',
      hasL     ? 'has-lesson' : '',
      isWknd   ? 'wknd'       : '',
      isToday  ? 'today'      : '',
      isSel    ? 'selected'   : '',
    ].filter(Boolean).join(' ');

    // Day number
    const numEl = document.createElement('div');
    numEl.className = 'day-num';
    if(isToday){
      const sp = document.createElement('span');
      sp.textContent = num;
      numEl.appendChild(sp);
    } else {
      numEl.textContent = num;
    }
    el.appendChild(numEl);

    // Dots
    if(hasL && !other){
      const uniq = [...new Set(lessons.map(l=>l.lesson))];
      const dotsEl = document.createElement('div');
      dotsEl.className = 'ldots';
      uniq.slice(0,4).forEach((_, i) => {
        const dot = document.createElement('div');
        dot.className = `ldot ${DOT_COLORS[i % DOT_COLORS.length]}`;
        dotsEl.appendChild(dot);
      });
      el.appendChild(dotsEl);
    }

    if(!other){
      el.addEventListener('click', () => onDayTap(iso));
    }

    grid.appendChild(el);
  });
}

/* ══════════════════════════════════════════════
   DAY TAP
══════════════════════════════════════════════ */
function onDayTap(iso){
  selISO  = iso;
  selLKey = null;
  renderCal();

  const d       = parseLocal(iso);
  const lessons = getLessons(iso);
  const dayName = DAYS[d.getDay()];
  const dateTxt = `${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;

  document.getElementById('sheetTitle').textContent = dayName;
  document.getElementById('sheetSub').textContent   = dateTxt;
  buildSheetContent(iso, lessons);
  openSheet();
}

/* ══════════════════════════════════════════════
   SHEET CONTENT
══════════════════════════════════════════════ */
function buildSheetContent(iso, lessons){
  const scroll = document.getElementById('sheetScroll');
  scroll.innerHTML = '';

  if(!lessons.length){
    scroll.innerHTML = `
      <div class="empty-day">
        <span class="eico">😴</span>
        <span class="etxt">Bu gün ders yok</span>
      </div>`;
    return;
  }

  lessons.forEach(item => {
    const key    = lessonKey(item);
    const hasPlan = !!APP_DATA.plans[item.lesson];
    const isAct  = key === selLKey;

    // Card
    const card = document.createElement('div');
    card.className = 'lcard' + (isAct ? ' active' : '');
    card.innerHTML = `
      <div class="lc-row1">
        <div class="lc-name">${item.lesson}</div>
        <div class="lc-time">${item.time}</div>
      </div>
      <div class="lc-tags">
        <span class="lc-tag">${item.slot}</span>
        ${item.group ? `<span class="lc-tag">${item.group}</span>` : ''}
        ${item.room  ? `<span class="lc-tag">${item.room}</span>`  : ''}
      </div>
      ${!hasPlan ? '<div class="lc-warn">⚠ Yıllık plan yüklenmedi</div>' : ''}
    `;
    card.addEventListener('click', () => {
      selLKey = isAct ? null : key;
      buildSheetContent(iso, lessons);
      // Scroll card into view
      setTimeout(() => card.scrollIntoView({behavior:'smooth', block:'nearest'}), 60);
    });
    scroll.appendChild(card);

    // Kazanım box (if active)
    if(isAct){
      const box = document.createElement('div');
      box.className = 'kbox';
      box.innerHTML = buildKazanim(item, iso);
      scroll.appendChild(box);
    }
  });
}

function buildKazanim(item, iso){
  const p = getPlan(item, iso);
  if(!p.ok) return `<div class="krow"><div class="klabel">Durum</div><div class="kwarn">⚠ ${p.msg}</div></div>`;

  if(item.lesson === 'MATEMATİK'){
    return `
      <div class="krow"><div class="klabel">Tarih Aralığı</div><div class="kval">${p.label}</div></div>
      <div class="krow"><div class="klabel">Kazanım</div><div class="kval">${p.gain||'—'}</div></div>
      <div class="krow"><div class="klabel">Modül</div><div class="kval">${p.module||'—'}</div></div>
      <div class="krow"><div class="klabel">Etkinlik</div><div class="kval">${p.activity||'—'}</div></div>
    `;
  }
  return `
    <div class="krow"><div class="klabel">${p.label} — İçerik</div><div class="kval">${p.content}</div></div>
  `;
}

/* ══════════════════════════════════════════════
   SHEET OPEN / CLOSE
══════════════════════════════════════════════ */
function openSheet(){
  document.getElementById('sheet').classList.add('open');
  document.getElementById('backdrop').classList.add('show');
  sheetOpen = true;
}
function closeSheet(){
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('backdrop').classList.remove('show');
  sheetOpen = false;
  // Reset drag transform
  const s = document.getElementById('sheet');
  s.style.transition = '';
  s.style.transform  = '';
}

document.getElementById('backdrop').addEventListener('click', closeSheet);

/* ══════════════════════════════════════════════
   DRAG-TO-DISMISS
══════════════════════════════════════════════ */
const dragEl = document.getElementById('sheetDrag');
const sheetEl = document.getElementById('sheet');

function dragStart(e){
  if(!sheetOpen) return;
  dragging = true;
  dragY0 = e.touches ? e.touches[0].clientY : e.clientY;
  dragDY = 0;
  sheetEl.style.transition = 'none';
}
function dragMove(e){
  if(!dragging) return;
  dragDY = Math.max(0, (e.touches ? e.touches[0].clientY : e.clientY) - dragY0);
  sheetEl.style.transform = `translateY(${dragDY}px)`;
}
function dragEnd(){
  if(!dragging) return;
  dragging = false;
  sheetEl.style.transition = '';
  sheetEl.style.transform  = '';
  if(dragDY > 110) closeSheet();
}

dragEl.addEventListener('touchstart', dragStart, {passive:true});
dragEl.addEventListener('touchmove',  dragMove,  {passive:true});
dragEl.addEventListener('touchend',   dragEnd);

/* ══════════════════════════════════════════════
   MONTH NAV
══════════════════════════════════════════════ */
document.getElementById('prevMonth').addEventListener('click', () => {
  viewMonth--; if(viewMonth < 0){ viewMonth=11; viewYear--; }
  renderCal();
});
document.getElementById('nextMonth').addEventListener('click', () => {
  viewMonth++; if(viewMonth > 11){ viewMonth=0; viewYear++; }
  renderCal();
});

/* ══════════════════════════════════════════════
   SWIPE LEFT/RIGHT on calendar for month nav
══════════════════════════════════════════════ */
let swX0=0, swY0=0;
const calEl = document.getElementById('calGrid');
calEl.addEventListener('touchstart', e => { swX0=e.touches[0].clientX; swY0=e.touches[0].clientY; }, {passive:true});
calEl.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - swX0;
  const dy = Math.abs(e.changedTouches[0].clientY - swY0);
  if(Math.abs(dx)>50 && dy<40){
    if(dx<0){ viewMonth++; if(viewMonth>11){viewMonth=0;viewYear++;} }
    else     { viewMonth--; if(viewMonth<0){viewMonth=11;viewYear--;} }
    renderCal();
  }
}, {passive:true});

/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
renderCal();

// Auto-open today if has lessons
const t = todayISO();
if(getLessons(t).length > 0){
  setTimeout(() => onDayTap(t), 400);
}
</script>
